<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng Tool - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <div class="logo-text">
                    <h1>Tổng Tool</h1>
                    <p>Trang chủ các công cụ nội bộ</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="btn-add">Thêm Tool</button>
            </div>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" placeholder="Tìm theo tên, mô tả, tag... (phím /)">
                <span class="search-count">Tổng 5 tool</span>
            </div>
            <button class="btn-favorite">
                <i class="fa-solid fa-star"></i> Yêu thích
            </button>
        </div>

        <!-- Pinned Section -->
        <div class="section">
            <h2 class="section-header">Đã ghim</h2>
            <!-- Pinned content if any -->
        </div>

        <!-- All Tools Section -->
        <div class="section">
            <h2 class="section-header">Tất cả công cụ</h2>
            
            <div class="grid" id="product-grid">
                <!-- Data will be loaded here from Supabase -->
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
